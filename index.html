<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VEXTASOFT</title>
    <style>
        @import url('https://fonts.googleapis.com');

        body {
            background: #000205;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: 'Exo 2', sans-serif;
            overflow: hidden;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #001a33 0%, #000205 100%);
        }

        /* Название компании СВЕРХУ */
        header {
            padding-top: 80px;
            text-align: center;
        }

        .brand-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 15vw, 8.5rem);
            letter-spacing: 15px;
            text-shadow: 0 0 30px #00d2ff, 0 0 60px #0044ff;
            margin: 0;
        }

        /* Инфо об ОСНОВАТЕЛЕ СНИЗУ */
        .founder-panel {
            padding: 60px 10%;
            background: linear-gradient(to top, rgba(0, 40, 80, 0.9), transparent);
            border-top: 2px solid #00d2ff;
            backdrop-filter: blur(10px);
        }

        .founder-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            color: #fff;
            letter-spacing: 5px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px #00d2ff;
        }

        .founder-title {
            color: #00d2ff;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
        }

        .footer-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .dev-info {
            font-family: monospace;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
        }

        .request-btn {
            background: #00d2ff;
            color: #000;
            padding: 20px 60px;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.3s;
        }

        .request-btn:hover {
            box-shadow: 0 0 50px #00d2ff;
            transform: scale(1.05);
            background: #fff;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="brand-title">VextaSoft</h1>
    </header>

    <div class="founder-panel">
        <span class="founder-title">Founder & CEO</span>
        <h2 class="founder-name">Ибрахим Джудаев Заурович</h2>
        
        <div class="footer-flex">
            <div class="dev-info">
                // Движок: Unity Engine<br>
                // Статус: Основатель<br>
                // Написать: h66859681@gmail.com
            </div>
            
            <a href="mailto:h66859681@gmail.com" class="request-btn">
                Написать
            </a>
        </div>
    </div>

</body>
</html>
